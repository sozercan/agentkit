name: CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - ".codex/**"
      - ".claude/**"
  pull_request:
    paths-ignore:
      - ".codex/**"
      - ".claude/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Validate GitHub Actions and shell syntax
        run: |
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 .github/workflows/*.yml
          bash -n scripts/live-copilot-agent-e2e.sh
          bash -n deploy/foundry/doctor.sh deploy/foundry/toolbox/setup.sh deploy/foundry/search/setup.sh deploy/foundry/memory/setup.sh deploy/foundry/rbac/assign-agent-identity.sh deploy/foundry/scripts/invoke_responses.sh
          python3 -m py_compile deploy/foundry/render_agent.py test/foundry-hosted-agent/foundry_live.py
          python3 deploy/foundry/render_agent.py deploy/foundry/agentkit.foundry.yaml.example >/tmp/agentkit-foundry-agent.yaml
          grep -q '^environment_variables:' /tmp/agentkit-foundry-agent.yaml
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          bad = []
          for path in sorted(Path('.github/workflows').glob('*.y*ml')):
              for lineno, line in enumerate(path.read_text().splitlines(), start=1):
                  match = re.match(r'^\s*uses:\s*([^#\s]+)', line)
                  if not match:
                      continue
                  ref = match.group(1).strip('"\'')
                  if ref.startswith('./'):
                      continue
                  if ref.startswith('docker://'):
                      ok = re.fullmatch(r'docker://[^@]+@sha256:[0-9a-fA-F]{64}', ref) is not None
                  else:
                      ok = re.fullmatch(r'[^@]+@[0-9a-fA-F]{40}', ref) is not None
                  if not ok:
                      bad.append(f'{path}:{lineno}: {ref}')

          if bad:
              print('GitHub Actions uses: references must be pinned to immutable digests/full commit SHAs:', file=sys.stderr)
              print('\n'.join(bad), file=sys.stderr)
              sys.exit(1)
          PY

      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/golangci-lint" version

      - name: Check Go formatting
        run: golangci-lint fmt --diff

      - name: Lint Go
        run: make lint

      - name: Vet Go
        run: go vet ./...

      - name: Test Go with race detector
        run: make test

      - name: Build frontend binary
        run: go build -o /tmp/agentkit-frontend ./cmd/frontend

  python:
    name: Python checks (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: common
            path: runtimes/common
          - package: pydantic-ai adapter
            path: runtimes/pydantic-ai
          - package: microsoft-agent-framework adapter
            path: runtimes/microsoft-agent-framework
          - package: langgraph adapter
            path: runtimes/langgraph
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install package and test dependencies
        working-directory: ${{ matrix.path }}
        run: |
          set -euxo pipefail
          uv venv --python 3.12 .venv
          if [ "${{ matrix.path }}" != "runtimes/common" ]; then
            uv pip install --python .venv/bin/python -e ../common
          fi
          prerelease_args=()
          if [ "${{ matrix.path }}" = "runtimes/microsoft-agent-framework" ]; then
            # The Azure AI Search MAF adapter is currently published as a beta
            # package and depends on a beta azure-search-documents build.
            prerelease_args+=(--prerelease=allow)
          fi
          uv pip install --python .venv/bin/python "${prerelease_args[@]}" -e ".[dev]" build

      - name: Compile Python modules
        working-directory: ${{ matrix.path }}
        run: |
          set -euxo pipefail
          targets=()
          if [ -d agentkit_serve ]; then
            targets+=(agentkit_serve)
          fi
          if [ -d agentkit_serve_common ]; then
            targets+=(agentkit_serve_common)
          fi
          if [ -d ../common/agentkit_serve_common ]; then
            targets+=(../common/agentkit_serve_common)
          fi
          .venv/bin/python -m compileall "${targets[@]}"

      - name: Run Python tests
        working-directory: ${{ matrix.path }}
        run: |
          set -euxo pipefail
          if [ -d tests ]; then
            .venv/bin/python -m pytest -q
          else
            echo "No package-local tests for ${{ matrix.package }}; compile and wheel checks cover it."
          fi

      - name: Build Python wheel
        working-directory: ${{ matrix.path }}
        run: .venv/bin/python -m build --wheel

  container-build:
    name: Container build and offline smoke
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Free disk space for Docker-heavy checks
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup"
          df -h
          docker system df || true

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift

          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk usage after cleanup"
          df -h
          docker system df || true

      - name: Setup Docker daemon with containerd image store
        uses: docker/setup-docker-action@e61617a16c407a86262fb923c35a616ddbe070b3 # v4.6.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Configure Docker Buildx daemon builder
        run: |
          docker buildx version
          docker buildx inspect --bootstrap
          echo "BUILDER=" >> "$GITHUB_ENV"

      - name: Build AgentKit frontend and runtime adapters
        run: |
          set -euxo pipefail
          make build-agentkit TAG=ci
          make build-serve TAG=ci
          make build-serve-maf TAG=ci
          make build-serve-langgraph TAG=ci

      - name: Build test agent images for all runtimes
        run: |
          set -euxo pipefail
          make build-test-agent TAG=ci BUILDER=
          make build-test-agent TAG=ci BUILDER= RUNTIME=maf
          make build-test-agent TAG=ci BUILDER= RUNTIME=langgraph

      - name: Smoke test built agent images
        run: |
          set -euo pipefail

          cleanup() {
            docker rm -f agentkit-smoke-pydantic agentkit-smoke-maf agentkit-smoke-langgraph >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          smoke() {
            local name="$1"
            local image="$2"
            local port="$3"

            docker rm -f "$name" >/dev/null 2>&1 || true
            docker run -d --name "$name" \
              --platform linux/amd64 \
              -p "127.0.0.1:${port}:8080" \
              -e AGENTKIT_BIND=0.0.0.0 \
              -e AGENTKIT_AUTH_TOKEN=ci-smoke-token \
              -e OPENAI_API_KEY=ci-dummy-key \
              "$image"

            for _ in $(seq 1 60); do
              if curl -fsS "http://127.0.0.1:${port}/healthz" >/dev/null; then
                docker logs "$name"
                return 0
              fi
              sleep 1
            done

            docker logs "$name" || true
            return 1
          }

          smoke agentkit-smoke-pydantic hello-agent:ci 18080
          smoke agentkit-smoke-maf maf-agent:ci 18081
          smoke agentkit-smoke-langgraph langgraph-agent:ci 18082

  live-copilot-e2e:
    name: Live Vekil/Copilot E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      VEKIL_IMAGE: ghcr.io/sozercan/vekil@sha256:d13edeedf7bec319da8eb3ea4949a4d0802e244c14765a347e62e1b8b7be8e3d
    steps:
      - name: Decide whether live Vekil/Copilot E2E can run
        id: gate
        env:
          IS_FORK: ${{ github.event.pull_request.head.repo.fork || false }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ "${IS_FORK}" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping live Vekil/Copilot E2E for fork pull requests because repository secrets are not exposed." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${ACTOR}" = "dependabot[bot]" ] && [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping live Vekil/Copilot E2E for Dependabot pull requests because repository secrets are not exposed." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Skipping live Vekil/Copilot E2E because COPILOT_GITHUB_TOKEN is not configured for this run." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Explain skipped live Vekil/Copilot E2E
        if: steps.gate.outputs.run != 'true'
        run: echo "${{ steps.gate.outputs.reason }}"

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Free disk space for Docker-heavy live E2E
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup"
          df -h
          docker system df || true

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift

          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk usage after cleanup"
          df -h
          docker system df || true

      - name: Setup Go
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Docker daemon with containerd image store
        if: steps.gate.outputs.run == 'true'
        uses: docker/setup-docker-action@e61617a16c407a86262fb923c35a616ddbe070b3 # v4.6.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Configure Docker Buildx daemon builder
        if: steps.gate.outputs.run == 'true'
        run: |
          docker buildx version
          docker buildx inspect --bootstrap
          echo "BUILDER=" >> "$GITHUB_ENV"

      - name: Run live Vekil-backed AgentKit E2E
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/live-copilot-agent-e2e.sh
