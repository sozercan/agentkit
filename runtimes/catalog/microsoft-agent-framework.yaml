# AgentKit runtime catalog entry.
#
# Purpose: names the "microsoft-agent-framework" runtime adapter (alias: "maf")
# and its default adapter image. The converter uses this adapter image as the LLB
# base and writes the resolved /agent/agent.yaml layer on top; the image then
# serves the same OpenAI /v1 façade as the pydantic-ai runtime — byte-for-byte ABI
# compatible. Select it from an agentkitfile with `runtime: microsoft-agent-framework`
# (or `runtime: maf`). Override the adapter per build with `--build-arg adapter=<ref>`
# (the local dev loop points it at `agentkit-serve-maf:test`). A Go catalog
# consistency test checks this human-readable entry against pkg/agentkit/runtimes.
apiVersion: v1alpha1
runtime: microsoft-agent-framework
aliases:
  - maf
capabilities:
  - stdio-mcp
  - streamable-http-mcp
  - workload-identity-token-auth
  - mcp-skills
  - filesystem-skills
  - context-provider-skills
  - context-provider-search
  - context-provider-memory
  - model-workload-identity-auth
adapter: ghcr.io/sozercan/agentkit/serve-maf:latest
