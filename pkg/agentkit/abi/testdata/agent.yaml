abiVersion: "v0"
metadata:
  name: "acme-support"
model:
  provider: "openai-compatible"
  baseURL: "https://api.openai.com/v1"
  name: "gpt-4o-mini"
  apiKeyEnv: "OPENAI_API_KEY"
instructions: "Be helpful and cite sources."
tools:
- name: "fetch"
  command:
  - "uvx"
  - "mcp-server-fetch"
  env:
  - "FETCH_TIMEOUT"
expose:
  openai: true
  port: 8080
