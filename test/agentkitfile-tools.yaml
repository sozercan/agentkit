#syntax=agentkit:test
# v0 fixture that exercises the tool path: the same four keys plus ONE stdio MCP
# server declared as a `command` (v0 supports command tools only — image-based
# MCP staging is v1). agentkit-serve spawns the subprocess at runtime; nothing
# is baked into the image but the tool's argv and declared env var NAMES.
apiVersion: v1alpha1
kind: Agent
metadata:
  name: fetch-summarizer
model:
  provider: openai-compatible
  baseURL: https://api.openai.com/v1
  name: gpt-4o-mini
  apiKeyEnv: OPENAI_API_KEY
instructions: |
  Summarize any URL the user gives you in three bullet points.
  Use the fetch tool to retrieve the page contents first.
tools:
  - name: fetch
    command: ["uvx", "mcp-server-fetch"]
expose:
  openai: true
